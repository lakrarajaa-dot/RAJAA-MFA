<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion Sécurisée - Smart Application</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Style.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #0a0f1c, #1a2338);
      color: white;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* Arrière-plan animé */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(0, 229, 153, 0.08);
      filter: blur(60px);
      animation: floatSlow 45s infinite linear;
    }

    .bg-circle:nth-child(1) { width: 700px; height: 700px; top: -15%; left: -10%; animation-duration: 55s; }
    .bg-circle:nth-child(2) { width: 850px; height: 850px; bottom: -25%; right: -15%; animation-duration: 70s; animation-delay: -25s; }
    .bg-circle:nth-child(3) { width: 600px; height: 600px; top: 35%; right: 10%; animation-duration: 50s; animation-delay: -12s; }

    @keyframes floatSlow {
      0%   { transform: translate(0, 0) rotate(0deg); }
      50%  { transform: translate(100px, -90px) rotate(180deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 229, 153, 0.8);
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(0, 229, 153, 0.9);
      animation: particleRise 16s linear infinite;
      z-index: -1;
    }

    @keyframes particleRise {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.9; }
      100% { transform: translateY(-100vh) scale(1.3); opacity: 0; }
    }

    .login-container {
      min-height: calc(100vh - 78px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 70px -20px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .title {
      font-size: 1.95rem;
      font-weight: 700;
      color: #006554;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #1c1b1b;
      font-size: 1.02rem;
    }

    .stepper {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 32px 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e5e2e1;
      transition: all 0.3s ease;
    }

    .dot.is-active {
      background: #006554;
      box-shadow: 0 0 0 4px rgba(0, 101, 84, 0.3);
      transform: scale(1.2);
    }

    .form-panel {
      display: none;
    }

    .form-panel.visible {
      display: block;
    }

    .input-wrapper {
      margin-bottom: 24px;
    }

    .input-wrapper label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 8px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 15px 18px;
      border: 1.5px solid #ddd;
      border-radius: 14px;
      font-size: 1.05rem;
      transition: all 0.3s ease;
    }

    .input-wrapper input:focus {
      border-color: #006554;
      box-shadow: 0 0 0 4px rgba(0, 101, 84, 0.15);
      outline: none;
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #006554, #0c806b);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 101, 84, 0.4);
    }

    .error-box, .info-box {
      padding: 14px 18px;
      border-radius: 14px;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .error-box {
      background: #ffebee;
      color: #c62828;
      display: none;
    }

    .error-box.active {
      display: block;
    }

    .info-box {
      background: #e8f5e9;
      color: #2e7d32;
    }
  </style>
</head>
<body>

  <!-- Arrière-plan animé -->
  <div class="background">
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/accueil" class="logo">
      Smart Application
    </a>
    
    <ul class="nav-links">
      <li><a href="/accueil">Accueil</a></li>
      <li><a href="/blog">Blog</a></li>
      <li><a href="/logs">Journal</a></li>
    </ul>
  </nav>

  <!-- Formulaire de connexion -->
  <div class="login-container">
    <div class="login-card">

      <div class="header">
        <h2 class="title">Espace Sécurisé</h2>
        <p class="subtitle">Authentification renforcée par double vérification</p>
      </div>

      <!-- Stepper -->
      <div class="stepper">
        <div class="dot is-active" id="step1"></div>
        <div class="dot" id="step2"></div>
        <div class="dot" id="step3"></div>
      </div>

      <!-- Étape 1 -->
      <div class="form-panel visible" id="view1">
        <div class="error-box" id="err1"></div>
        
        <div class="input-wrapper">
          <label>Identifiant ou Email</label>
          <input type="email" id="user_email" placeholder="nom@exemple.com">
        </div>
        
        <div class="input-wrapper">
          <label>Mot de passe</label>
          <input type="password" id="user_password" placeholder="••••••••">
        </div>
        
        <button class="btn-submit" onclick="handleStep1()">Se connecter</button>
      </div>

      <!-- Étape 2 -->
      <div class="form-panel" id="view2">
        <div class="info-box" id="info2"></div>
        <div class="error-box" id="err2"></div>
        
        <div class="input-wrapper">
          <label>Code reçu par email</label>
          <input type="text" id="email_otp" placeholder="123456" maxlength="6" style="text-align: center; letter-spacing: 8px; font-size: 1.35rem;">
        </div>
        
        <button class="btn-submit" onclick="handleStep2()">Vérifier le code</button>
      </div>

      <!-- Étape 3 -->
      <div class="form-panel" id="view3">
        <div class="error-box" id="err3"></div>
        
        <div id="setup-totp" style="display: none; text-align: center; margin: 25px 0;">
          <p style="margin-bottom: 12px; color: #555;">Scannez ce QR Code avec Google Authenticator :</p>
          <img id="img_qr" style="max-width: 190px; border-radius: 16px; background: white; padding: 12px;">
          <p id="txt_secret" style="font-family: monospace; margin-top: 14px; color: #555;"></p>
        </div>

        <div class="input-wrapper">
          <label>Code de l'application d'authentification</label>
          <input type="text" id="app_otp" placeholder="000000" maxlength="6" style="text-align: center; letter-spacing: 10px; font-size: 1.4rem;">
        </div>
        
        <button class="btn-submit" onclick="handleStep3()">Finaliser la connexion</button>
      </div>

    </div>
  </div>

  <script>
    // Création des particules animées
    function createParticles() {
      const bg = document.querySelector('.background');
      for (let i = 0; i < 45; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (Math.random() * 18 + 14) + 's';
        p.style.animationDelay = '-' + Math.random() * 25 + 's';
        p.style.opacity = Math.random() * 0.6 + 0.4;
        bg.appendChild(p);
      }
    }

    createParticles();

    // Gestion des étapes
    function changerVue(numero) {
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('visible'));
      document.getElementById('view' + numero).classList.add('visible');

      for(let i = 1; i <= 3; i++) {
        const dot = document.getElementById('step' + i);
        dot.className = 'dot';
        if (i < numero) dot.classList.add('is-done');
        if (i === numero) dot.classList.add('is-active');
      }
    }

    function alerte(id, texte) {
      const el = document.getElementById(id);
      if (el) {
        el.innerText = texte;
        el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), 6000);
      }
    }

    async function handleStep1() {
      const email = document.getElementById('user_email').value.trim();
      const password = document.getElementById('user_password').value;

      if (!email || !password) return alerte('err1', 'Veuillez remplir tous les champs');

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.error) return alerte('err1', data.error);

        changerVue(2);
        alerte('info2', `Un code a été envoyé à ${email}`);
      } catch (e) {
        alerte('err1', 'Erreur de connexion au serveur');
      }
    }

    async function handleStep2() {
      const code = document.getElementById('email_otp').value.trim();
      if (code.length < 6) return alerte('err2', 'Veuillez entrer le code complet');

      try {
        const res = await fetch('/verify-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        const data = await res.json();

        if (data.error) return alerte('err2', data.error);

        if (data.qrCode) {
          document.getElementById('img_qr').src = data.qrCode;
          document.getElementById('txt_secret').innerText = "Clé secrète : " + data.secret;
          document.getElementById('setup-totp').style.display = 'block';
        }

        changerVue(3);
      } catch (e) {
        alerte('err2', 'Erreur lors de la vérification');
      }
    }

    async function handleStep3() {
      const code = document.getElementById('app_otp').value.trim();
      if (code.length < 6) return alerte('err3', 'Veuillez entrer le code à 6 chiffres');

      try {
        const res = await fetch('/verify-totp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        const data = await res.json();

        if (data.error) return alerte('err3', data.error);

        window.location.href = '/accueil';
      } catch (e) {
        alerte('err3', 'Erreur lors de la validation');
      }
    }

    // Touche Entrée
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (document.getElementById('view1').classList.contains('visible')) handleStep1();
        else if (document.getElementById('view2').classList.contains('visible')) handleStep2();
        else handleStep3();
      }
    });
  </script>
</body>
</html>
